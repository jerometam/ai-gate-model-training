<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>教學機器 Hovercraft 示範</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 20px; text-align: center; }
    #webcam-container { margin-top: 20px; display: flex; justify-content: center; }
    canvas { width: 100%; height: auto; }
    #label-container div { margin: 5px 0; }
    #error-message { color: red; font-weight: bold; margin-top: 10px; }
    #detected-message { font-size: 20px; font-weight: bold; color: orange; margin-top: 10px; }
    #countdown { font-size: 20px; font-weight: bold; color: blue; margin-top: 10px; }
    #gate-message { font-size: 24px; font-weight: bold; color: green; margin-top: 10px; }
    #pass-countdown { font-size: 20px; font-weight: bold; color: purple; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>教學機器 Hovercraft 示範</h2>
  <p>請貼上你的 Teachable Machine 模型網址（必須有兩個類別：<b>Hovercraft</b> 與 <b>No Hovercraft</b>）</p>
  <input type="text" id="modelURL" placeholder="請在此貼上模型網址" size="60">
  <button type="button" onclick="init()">開始模型</button>

  <div id="error-message"></div>
  <div id="webcam-container"></div>
  <div id="label-container"></div>
  <div id="detected-message"></div>
  <div id="countdown"></div>
  <div id="gate-message"></div>
  <div id="pass-countdown"></div>

  <script type="text/javascript">
    let model, webcam, labelContainer, maxPredictions;
    let countdownTimer = null;
    let countdownValue = 3;
    let hovercraftStartTime = null;
    let passTimer = null;
    let passValue = 30;

    async function init() {
      const baseURL = document.getElementById("modelURL").value.trim();
      const errorBox = document.getElementById("error-message");
      errorBox.innerHTML = "";
      document.getElementById("gate-message").innerHTML = "";
      document.getElementById("countdown").innerHTML = "";
      document.getElementById("detected-message").innerHTML = "";
      document.getElementById("pass-countdown").innerHTML = "";

      if (!baseURL) {
        errorBox.innerHTML = "請先輸入模型網址。";
        return;
      }

      const modelURL = baseURL + "model.json";
      const metadataURL = baseURL + "metadata.json";

      try {
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const classes = model.getClassLabels();
        if (maxPredictions !== 2 ||
            classes[0] !== "Hovercraft" ||
            classes[1] !== "No Hovercraft") {
          errorBox.innerHTML = "模型必須有兩個類別：'Hovercraft' 與 'No Hovercraft'（大小寫需完全符合）。";
          return;
        }

        const flip = true;
        webcam = new tmImage.Webcam(200, 200, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
          labelContainer.appendChild(document.createElement("div"));
        }
      } catch (err) {
        console.error("載入模型或攝影機錯誤:", err);
        errorBox.innerHTML = "載入模型或攝影機失敗，請查看 Console。";
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      for (let i = 0; i < maxPredictions; i++) {
        const classPrediction =
          prediction[i].className + ": " + prediction[i].probability.toFixed(2);
        labelContainer.childNodes[i].innerHTML = classPrediction;
      }

      const hovercraftProb = prediction[0].probability;

      if (hovercraftProb >= 0.95 && !passTimer) {
        if (!hovercraftStartTime) {
          hovercraftStartTime = Date.now();
        }
        const elapsed = (Date.now() - hovercraftStartTime) / 1000;

        if (elapsed < 1) {
          document.getElementById("detected-message").innerText = "偵測到 Hovercraft";
        } else if (elapsed >= 1 && !countdownTimer) {
          document.getElementById("detected-message").innerText = "";
          startCountdown();
        }
      } else if (!passTimer) {
        hovercraftStartTime = null;
        resetCountdown();
      }
    }

    function startCountdown() {
      countdownValue = 3;
      document.getElementById("countdown").innerText = "倒數：" + countdownValue;
      countdownTimer = setInterval(() => {
        countdownValue--;
        if (countdownValue > 0) {
          document.getElementById("countdown").innerText = "倒數：" + countdownValue;
        } else {
          clearInterval(countdownTimer);
          countdownTimer = null;
          document.getElementById("countdown").innerText = "";
          document.getElementById("gate-message").innerText = "閘門開啟";
          console.log("HOVERCRAFT");
          startPassCountdown();
        }
      }, 1000);
    }

    function startPassCountdown() {
      passValue = 30;
      document.getElementById("pass-countdown").innerText = "閘門將在 " + passValue + " 秒後關閉";
      passTimer = setInterval(() => {
        passValue--;
        if (passValue > 0) {
          document.getElementById("pass-countdown").innerText = "閘門將在 " + passValue + " 秒後關閉";
        } else {
          clearInterval(passTimer);
          passTimer = null;
          document.getElementById("pass-countdown").innerText = "";
          document.getElementById("gate-message").innerText = "";
          console.log("CLOSE");
          hovercraftStartTime = null;
        }
      }, 1000);
    }

    function resetCountdown() {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
      document.getElementById("countdown").innerText = "";
      document.getElementById("gate-message").innerText = "";
      document.getElementById("detected-message").innerText = "";
    }
  </script>
</body>
</html>
